name: Django CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: cowrite
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 1234
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"   # ✅ FIXED (was 3.10)

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          until pg_isready -h postgres -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run migrations
        env:
          DB_NAME: cowrite
          DB_USER: postgres
          DB_PASSWORD: 1234
          DB_HOST: postgres
          DB_PORT: 5432
        run: |
          cd backend
          python manage.py migrate

      - name: Run tests
        env:
          DB_NAME: cowrite
          DB_USER: postgres
          DB_PASSWORD: 1234
          DB_HOST: postgres
          DB_PORT: 5432
        run: |
          cd backend
          python manage.py test